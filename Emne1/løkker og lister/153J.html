<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>

    <script>

        let smallStraight = [1, 2, 3, 4, 5];
        let bigStraight = [2, 3, 4, 5, 6];
        let numbers = [1, 4, 5, 4, 6];

        function getStraight(straight) {
            const uniqe = new Set(straight);
            let sum = 0;
            for (let num of straight) {
                sum += num;
            }

            if (uniqe.size === 5 && [1, 2, 3, 4, 5].every(n => uniqe.has(n))) {
                return `Dette er en liten straight ${sum}`;
            }
            else if (uniqe.size === 5 && [2, 3, 4, 5, 6].every(n => uniqe.has(n))) {
                return `Dette er en stor straight ${sum}`;
            }
            else {
                return `Dette er bare en sum ${sum}`;
            }

        }

        function updateView() {
            document.getElementById('app').innerHTML = ` ${getStraight(bigStraight)} <br> ${getStraight(smallStraight)} <br>  ${getStraight(numbers)} `;
        }

        updateView();
    </script>
</body>

</html>

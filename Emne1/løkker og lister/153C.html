<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>

    <script>

        function encryptText(text) {
            let result = "";
            let alphabet = "ABCDEFGHIJKLMOPQRSTUVWXYZ횈횠횇";
            let cipher    = "횇횠횈YUOIEABCDFGHJKLMPQRSTVWXZ"

            for (let char of text) {
                let index = alphabet.indexOf(char);

                if (index !== -1) {
                    result += cipher[index];
                } else {
                    result += char; 
                }
            }

            return result;
        }

        function updateView() {
            document.getElementById('app').innerHTML = encryptText("TERJE")
        }

        updateView();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app"></div>

    <script>

        let minNumber = 100;
        let maxNumber = 1000;        
          
        function makeNumbers(minNumber, maxNumber ) {   
            let result = '';         
            for (let number = minNumber; number < maxNumber; number += 7) {
                result += number + '<br>'               
            }

            return result;
        }

        function updateView() {
            document.getElementById('app').innerHTML =  makeNumbers(minNumber, maxNumber);
        }

        updateView();
    </script>
</body>
</html>
